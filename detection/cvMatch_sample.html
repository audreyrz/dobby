<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Matrix Mapper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #fff;
    }

    p.sub {
      font-size: 13px;
      color: #777;
      margin-bottom: 1.5rem;
    }

    #dropzone {
      border: 1.5px dashed #555;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      color: #888;
      font-size: 14px;
      margin-bottom: 1.5rem;
      transition: background 0.15s, border-color 0.15s;
    }

    #dropzone.drag {
      background: #1e2a3a;
      border-color: #4a8fd4;
    }

    #dropzone svg {
      display: block;
      margin: 0 auto 10px;
      opacity: 0.5;
    }

    .panel {
      background: #252525;
      border-radius: 10px;
      border: 0.5px solid #333;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .ctrl label {
      white-space: nowrap;
    }

    .ctrl span {
      min-width: 34px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    input[type=range] {
      width: 100px;
      accent-color: #4a8fd4;
    }

    select {
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 0.5px solid #444;
      background: #333;
      color: #e0e0e0;
      cursor: pointer;
    }

    input[type=color] {
      height: 28px;
      width: 44px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      padding: 0;
      background: none;
    }

    button {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 0.5px solid #444;
      background: #333;
      color: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button:hover {
      background: #3a3a3a;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      background: #2a3a2a;
      color: #6dbf6d;
      border: 0.5px solid #3a5a3a;
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .canvasBox {
      border-radius: 12px;
      overflow: hidden;
      border: 0.5px solid #333;
      position: relative;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      width: 100%;
    }

    #overlayCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>
  <p class="sub">Grid fitted via homography from blob detection</p>

  <div id="dropzone">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
    Drop the original image here to sample &amp; render
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div id="mainUI" style="display:none">
    <div class="panel">
      <div class="panel-title">Render settings</div>
      <div class="controls">
        <div class="ctrl">
          <label>Pixel size</label>
          <input type="range" id="drawSize" min="1" max="30" value="8" step="0.5">
          <span id="drawSizeVal">8</span>
        </div>
        <div class="ctrl">
          <label>Gap</label>
          <input type="range" id="gap" min="0" max="12" value="2" step="1">
          <span id="gapVal">2</span>
        </div>
        <div class="ctrl">
          <label>Sample radius</label>
          <input type="range" id="sampleR" min="1" max="12" value="3" step="1">
          <span id="sampleRVal">3</span>
        </div>
        <div class="ctrl">
          <label>Tone</label>
          <select id="modeSelect">
            <option value="gray">Grayscale</option>
            <option value="invert">Inverted</option>
            <option value="dark">Dark boost</option>
            <option value="light">Light boost</option>
          </select>
        </div>
        <div class="ctrl">
          <label>Background</label>
          <input type="color" id="bgColor" value="#111111">
        </div>
        <button id="renderBtn">Render</button>
        <button id="exportBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export PNG
        </button>
      </div>
      <div class="controls" style="margin-top:0.75rem">
        <div class="ctrl">
          <label><input type="checkbox" id="showOverlay" checked style="margin-right:4px"> Show grid overlay</label>
        </div>
      </div>
      <p class="hint">Green = projected grid positions (includes interpolated ones). Sample radius = px around each
        center to average.</p>
    </div>

    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
      <div style="flex:1; min-width:280px;">
        <div style="font-size:12px; color:#555; margin-bottom:0.5rem;">Source + grid positions</div>
        <div class="canvasBox">
          <canvas id="srcCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
        </div>
      </div>
      <div style="flex:1; min-width:280px; display:none" id="outputCol">
        <div style="font-size:12px; color:#555; margin-bottom:0.5rem;">Rendered output</div>
        <div class="canvasBox">
          <canvas id="outCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>

    document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          offCanvas.width = img.width; offCanvas.height = img.height;
          offCtx.drawImage(img, 0, 0);
          const maxW = Math.min(900, img.width);
          displayScale = maxW / img.width;
          srcCanvas.width = Math.round(img.width * displayScale);
          srcCanvas.height = Math.round(img.height * displayScale);
          overlayCanvas.width = srcCanvas.width;
          overlayCanvas.height = srcCanvas.height;
          srcCtx.drawImage(img, 0, 0, srcCanvas.width, srcCanvas.height);
          imgLoaded = true;
          document.getElementById('mainUI').style.display = 'block';
          dropzone.style.display = 'none';
          drawOverlay();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function drawOverlay() {
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      if (!document.getElementById('showOverlay').checked) return;
      overlayCtx.fillStyle = 'rgba(80, 220, 120, 0.85)';
      for (const { x, y } of CIRCLES) {
        overlayCtx.beginPath();
        overlayCtx.arc(x * displayScale, y * displayScale, 2, 0, Math.PI * 2);
        overlayCtx.fill();
      }
    }

    function sampleBrightness(cx, cy, r, data, W, H) {
      let total = 0, count = 0;
      const ir = Math.ceil(r);
      for (let dy = -ir; dy <= ir; dy++) {
        for (let dx = -ir; dx <= ir; dx++) {
          const px = Math.round(cx + dx), py = Math.round(cy + dy);
          if (px < 0 || py < 0 || px >= W || py >= H) continue;
          const idx = (py * W + px) * 4;
          total += data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114;
          count++;
        }
      }
      return count > 0 ? total / count : 0;
    }

    function applyTone(b, mode) {
      let v = b / 255;
      if (mode === 'invert') v = 1 - v;
      else if (mode === 'dark') v = Math.pow(v, 1.8);
      else if (mode === 'light') v = Math.pow(v, 0.5);
      return Math.round(v * 255);
    }

    document.getElementById('renderBtn').addEventListener('click', () => {
      if (!imgLoaded) return;
      const drawSize = parseFloat(document.getElementById('drawSize').value);
      const gap = parseInt(document.getElementById('gap').value);
      const sampleR = parseInt(document.getElementById('sampleR').value);
      const mode = document.getElementById('modeSelect').value;
      const bg = document.getElementById('bgColor').value;

      const W = offCanvas.width, H = offCanvas.height;
      const scaleX = W / IMG_W, scaleY = H / IMG_H;
      const imgData = offCtx.getImageData(0, 0, W, H).data;

      const cellSize = drawSize + gap;
      outCanvas.width = NUM_COLS * cellSize;
      outCanvas.height = NUM_ROWS * cellSize;
      outCtx.fillStyle = bg;
      outCtx.fillRect(0, 0, outCanvas.width, outCanvas.height);

      for (let r = 0; r < NUM_ROWS; r++) {
        for (let c = 0; c < NUM_COLS; c++) {
          const cell = GRID[r][c];
          if (!cell) continue;  // out-of-bounds edge cell
          const sx = cell.x * scaleX, sy = cell.y * scaleY;
          const raw = sampleBrightness(sx, sy, sampleR, imgData, W, H);
          const v = applyTone(raw, mode);
          outCtx.fillStyle = `rgb(${v},${v},${v})`;
          outCtx.fillRect(c * cellSize + gap / 2, r * cellSize + gap / 2, drawSize, drawSize);
        }
      }

      document.getElementById('outputCol').style.display = 'block';
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'pixel-matrix.png';
      link.href = outCanvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>

</html>
